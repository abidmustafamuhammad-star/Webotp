<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Daftar — ReceOTP</title>
<link rel="icon" href="/assets/favicon.ico"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5/dist/brite/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>
body{background:linear-gradient(135deg,#f0f5ff 0%,#fdf0ff 100%);min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Segoe UI',system-ui,sans-serif;padding:2rem 1rem}
.auth-card{background:#fff;border-radius:1.5rem;box-shadow:0 10px 50px rgba(13,110,253,.12);width:100%;max-width:460px;padding:2.5rem}
.auth-logo{font-size:1.6rem;font-weight:900;color:#0d6efd;text-decoration:none;display:block;text-align:center;margin-bottom:.3rem}
.form-control:focus,.form-select:focus{border-color:#0d6efd;box-shadow:0 0 0 .25rem rgba(13,110,253,.15)}
.strength-bar{height:4px;border-radius:2px;background:#dee2e6;overflow:hidden;margin-top:.4rem}
.strength-fill{height:100%;width:0;transition:width .3s,background .3s;border-radius:2px}
</style>
</head>
<body>
<div class="auth-card">
  <a class="auth-logo" href="/" id="siteName">ReceOTP</a>
  <p class="text-center text-muted small mb-4">Buat akun baru — gratis & tanpa kartu kredit</p>
  <div id="alertBox"></div>
  <form id="regForm" novalidate>
    <div class="mb-3">
      <label class="form-label fw-600 small">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-at"></i></span>
        <input type="text" class="form-control" id="username" placeholder="min 3 karakter, huruf/angka/_" required/>
      </div>
      <div class="form-text small" id="usernameHint"></div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-600 small">Email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control" id="email" placeholder="email@kamu.com" required/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-600 small">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" id="password" placeholder="Minimal 8 karakter" required/>
        <button class="btn btn-outline-secondary" type="button" id="togglePwd"><i class="bi bi-eye"></i></button>
      </div>
      <div class="strength-bar mt-1"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="form-text small" id="strengthText"></div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-600 small">Konfirmasi Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" id="confirm" placeholder="Ulangi password" required/>
      </div>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="agree" required/>
      <label class="form-check-label small" for="agree">
        Saya setuju dengan <a href="/terms" target="_blank">Syarat & Ketentuan</a> dan <a href="/privacy" target="_blank">Kebijakan Privasi</a>.
      </label>
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 fw-700" id="regBtn">
      <span id="regSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
      Buat Akun Sekarang
    </button>
  </form>
  <div class="text-center mt-3">
    <span class="small text-muted">Sudah punya akun? </span><a href="/login" class="small fw-600">Masuk</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
<script>
fetch('/api/site-info').then(r=>r.json()).then(d=>{if(d.site_name)document.getElementById('siteName').textContent=d.site_name}).catch(()=>{});

document.getElementById('togglePwd').addEventListener('click',()=>{
  const p=document.getElementById('password');
  const i=document.querySelector('#togglePwd i');
  p.type=p.type==='password'?'text':'password';
  i.className=p.type==='password'?'bi bi-eye':'bi bi-eye-slash';
});

document.getElementById('username').addEventListener('input',function(){
  const v=/^[a-z0-9_]{3,30}$/.test(this.value.toLowerCase());
  this.value=this.value.toLowerCase();
  document.getElementById('usernameHint').textContent=this.value?v?'✓ Format valid':'✗ 3-30 karakter: huruf kecil, angka, underscore':'';
  document.getElementById('usernameHint').className='form-text small '+(v?'text-success':'text-danger');
});

document.getElementById('password').addEventListener('input',function(){
  const v=this.value,f=document.getElementById('strengthFill'),t=document.getElementById('strengthText');
  let s=0,msg='',c='';
  if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  const pct=[0,25,50,75,100][s];
  const clr=['','#dc3545','#fd7e14','#ffc107','#198754'][s];
  msg=['','Sangat Lemah','Lemah','Sedang','Kuat'][s];
  f.style.width=pct+'%';f.style.background=clr;
  t.textContent=v?msg:'';t.style.color=clr;
});

document.getElementById('regForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const ab=document.getElementById('alertBox');ab.innerHTML='';
  const username=document.getElementById('username').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const confirm=document.getElementById('confirm').value;
  if(password!==confirm){ab.innerHTML='<div class="alert alert-danger py-2 small">Password tidak cocok.</div>';return}
  if(!document.getElementById('agree').checked){ab.innerHTML='<div class="alert alert-danger py-2 small">Setujui syarat & ketentuan dulu.</div>';return}
  const btn=document.getElementById('regBtn');const sp=document.getElementById('regSpinner');
  btn.disabled=true;sp.classList.remove('d-none');
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
    const d=await r.json();
    if(!d.success){ab.innerHTML=`<div class="alert alert-danger py-2 small">${d.error}</div>`;return}
    ab.innerHTML='<div class="alert alert-success py-2 small">✅ Akun berhasil dibuat! Mengarahkan ke halaman login...</div>';
    setTimeout(()=>location.href='/login',1500);
  }catch{ab.innerHTML='<div class="alert alert-danger py-2 small">Gagal terhubung ke server.</div>'}
  finally{btn.disabled=false;sp.classList.add('d-none')}
});
</script>
</body>
</html>
