<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — ReceOTP</title>
<link rel="icon" href="/assets/favicon.ico"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5/dist/brite/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>
body{background:linear-gradient(135deg,#f0f5ff 0%,#fdf0ff 100%);min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Segoe UI',system-ui,sans-serif}
.auth-card{background:#fff;border-radius:1.5rem;box-shadow:0 10px 50px rgba(13,110,253,.12);width:100%;max-width:420px;padding:2.5rem}
.auth-logo{font-size:1.6rem;font-weight:900;color:#0d6efd;text-decoration:none;display:block;text-align:center;margin-bottom:.3rem}
.auth-sub{text-align:center;color:#6c757d;font-size:.92rem;margin-bottom:2rem}
.form-control:focus{border-color:#0d6efd;box-shadow:0 0 0 .25rem rgba(13,110,253,.15)}
.btn-primary{background:#0d6efd;border:none}
.divider{display:flex;align-items:center;gap:1rem;color:#adb5bd;font-size:.82rem;margin:1.2rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dee2e6}
.otp-input{display:flex;gap:.6rem;justify-content:center}
.otp-digit{width:3rem;height:3.5rem;font-size:1.6rem;font-weight:700;text-align:center;border:2px solid #dee2e6;border-radius:.75rem;transition:border-color .2s}
.otp-digit:focus{border-color:#0d6efd;outline:none;box-shadow:0 0 0 3px rgba(13,110,253,.15)}
.step-badge{width:2rem;height:2rem;border-radius:50%;background:#0d6efd;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
#step2{display:none}
.tg-badge{background:#e8f4fd;border:1.5px solid #bee3f8;border-radius:.75rem;padding:.75rem 1rem;display:flex;align-items:center;gap:.6rem;font-size:.88rem;color:#1a7dc0}
</style>
</head>
<body>
<div class="auth-card">
  <a class="auth-logo" href="/" id="siteName">ReceOTP</a>
  <p class="auth-sub">Masuk ke akun kamu</p>

  <!-- STEP 1 -->
  <div id="step1">
    <div id="alertBox"></div>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label fw-600 small">Username atau Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="login" placeholder="username atau email@kamu.com" required/>
        </div>
      </div>
      <div class="mb-3">
        <div class="d-flex justify-content-between mb-1">
          <label class="form-label fw-600 small mb-0">Password</label>
          <a href="#" class="small text-muted">Lupa password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Minimal 8 karakter" required/>
          <button class="btn btn-outline-secondary" type="button" id="togglePwd"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-700" id="loginBtn">
        <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
        Masuk
      </button>
    </form>
    <div class="divider">atau</div>
    <a href="/register" class="btn btn-outline-primary w-100">Daftar Akun Baru</a>
    <div class="text-center mt-3">
      <a href="/" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Kembali ke Beranda</a>
    </div>
  </div>

  <!-- STEP 2: kode Telegram -->
  <div id="step2">
    <div class="tg-badge mb-3">
      <i class="bi bi-telegram fs-5" style="color:#0088cc"></i>
      <div><strong>Cek Telegram kamu!</strong><br/>Kode 6-digit dikirim ke bot Telegram.</div>
    </div>
    <p class="text-muted small mb-3">Masukkan kode yang diterima. Berlaku selama <span class="fw-700 text-danger" id="countdown">5:00</span></p>
    <div id="otpAlert"></div>
    <div class="otp-input mb-4" id="otpInputs">
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
    </div>
    <button class="btn btn-primary w-100 py-2 fw-700" id="verifyBtn">
      <span id="verifySpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
      Verifikasi Kode
    </button>
    <div class="text-center mt-3">
      <button class="btn btn-link text-muted small" id="backToStep1"><i class="bi bi-arrow-left me-1"></i>Kembali</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
<script>
let pendingUserId=null,countdownTimer=null;

// Load site name
fetch('/api/site-info').then(r=>r.json()).then(d=>{if(d.site_name)document.getElementById('siteName').textContent=d.site_name}).catch(()=>{});

function alert(el,msg,type='danger'){el.innerHTML=`<div class="alert alert-${type} py-2 small">${msg}</div>`}
function setLoading(btn,spinner,on){btn.disabled=on;spinner.classList.toggle('d-none',!on)}

// Toggle password visibility
document.getElementById('togglePwd').addEventListener('click',()=>{
  const p=document.getElementById('password');
  const icon=document.querySelector('#togglePwd i');
  p.type=p.type==='password'?'text':'password';
  icon.className=p.type==='password'?'bi bi-eye':'bi bi-eye-slash';
});

// STEP 1 SUBMIT
document.getElementById('loginForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const ab=document.getElementById('alertBox');
  const btn=document.getElementById('loginBtn');
  const sp=document.getElementById('loginSpinner');
  ab.innerHTML='';
  setLoading(btn,sp,true);
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:document.getElementById('login').value.trim(),password:document.getElementById('password').value}),credentials:'include'});
    const d=await r.json();
    if(!d.success){alert(ab,d.error);return}
    if(!d.twofa){location.href='/dashboard';return}
    // punya Telegram → step 2
    pendingUserId=d.user_id;
    document.getElementById('step1').style.display='none';
    document.getElementById('step2').style.display='block';
    startCountdown(300);
    document.querySelectorAll('.otp-digit')[0].focus();
  }catch{alert(ab,'Gagal terhubung ke server.')}
  finally{setLoading(btn,sp,false)}
});

// OTP digit navigation
document.querySelectorAll('.otp-digit').forEach((inp,i,all)=>{
  inp.addEventListener('input',()=>{inp.value=inp.value.replace(/\D/g,'');if(inp.value&&i<all.length-1)all[i+1].focus()});
  inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value&&i>0)all[i-1].focus()});
  inp.addEventListener('paste',e=>{
    const text=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
    if(text.length>=6){[...text.slice(0,6)].forEach((c,j)=>all[j].value=c);e.preventDefault();all[5].focus()}
  });
});

// VERIFY
document.getElementById('verifyBtn').addEventListener('click',async()=>{
  const code=[...document.querySelectorAll('.otp-digit')].map(i=>i.value).join('');
  if(code.length<6){alert(document.getElementById('otpAlert'),'Masukkan semua 6 digit kode.');return}
  const btn=document.getElementById('verifyBtn');
  const sp=document.getElementById('verifySpinner');
  setLoading(btn,sp,true);
  try{
    const r=await fetch('/api/auth/verify-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:pendingUserId,code}),credentials:'include'});
    const d=await r.json();
    if(!d.success){alert(document.getElementById('otpAlert'),d.error);return}
    clearInterval(countdownTimer);
    location.href='/dashboard';
  }catch{alert(document.getElementById('otpAlert'),'Gagal terhubung.')}
  finally{setLoading(btn,sp,false)}
});

document.getElementById('backToStep1').addEventListener('click',()=>{
  clearInterval(countdownTimer);
  document.getElementById('step2').style.display='none';
  document.getElementById('step1').style.display='block';
});

function startCountdown(sec){
  clearInterval(countdownTimer);
  let s=sec;
  const el=document.getElementById('countdown');
  countdownTimer=setInterval(()=>{
    s--;
    const m=Math.floor(s/60),r=s%60;
    el.textContent=`${m}:${String(r).padStart(2,'0')}`;
    if(s<=0){clearInterval(countdownTimer);el.textContent='KEDALUWARSA';el.style.color='#dc3545';alert(document.getElementById('otpAlert'),'Kode kedaluwarsa. Silakan login ulang.','warning')}
  },1000);
}
</script>
</body>
</html>
